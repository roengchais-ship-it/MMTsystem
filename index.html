<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>มีเมตตา System Portal</title>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel for JSX support in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen text-slate-800 flex flex-col">
    <div id="root" class="flex flex-col min-h-screen"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons Components (SVG) ---
        const ShieldCheck = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="m9 12 2 2 4-4"/>
            </svg>
        );

        const UserCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="10" r="3"/>
                <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/>
            </svg>
        );

        const Megaphone = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m3 11 18-5v12L3 14v-3z"/>
                <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
            </svg>
        );

        const ArrowRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M5 12h14"/>
                <path d="m12 5 7 7-7 7"/>
            </svg>
        );

        const Cloud = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M17.5 19c0-1.7-1.3-3-3-3h-1.1c-.2-3.1-2.7-5.5-5.8-5.5-3.2 0-5.7 2.5-5.7 5.7v.5c-2.3.2-4 2-4 4.3 0 2.2 1.8 4 4 4h11.5c2.5 0 4.5-2 4.5-4.5s-2-4.5-4.5-4.5z"/>
            </svg>
        );

        const ClipboardCheck = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <path d="m9 14 2 2 4-4"/>
            </svg>
        );

        const Package = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m7.5 4.27 9 5.15"/>
                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
                <path d="m3.3 7 8.7 5 8.7-5"/>
                <path d="M12 22v-9"/>
            </svg>
        );
        
        const Layers = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                <polyline points="2 17 12 22 22 17"/>
                <polyline points="2 12 12 17 22 12"/>
            </svg>
        );

        const ShoppingCart = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="8" cy="21" r="1"/>
                <circle cx="19" cy="21" r="1"/>
                <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
            </svg>
        );

        const TrendingUp = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                <polyline points="17 6 23 6 23 12"/>
            </svg>
        );

        // --- Main App Component ---

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const systems = [
                {
                    id: 1,
                    name: "QC System",
                    description: "ระบบตรวจสอบคุณภาพสินค้าและบันทึกผลการตรวจสอบ",
                    url: "https://roengchais-ship-it.github.io/QCsystem/",
                    icon: <ClipboardCheck size={36} />, 
                    color: "from-[#2C4635] to-[#456d53]",
                    hoverColor: "text-[#2C4635]",
                    bgLight: "bg-green-50",
                    tag: "QC"
                },
                {
                    id: 2,
                    name: "Shipping สาขา",
                    description: "จัดการงานจัดส่งสินค้า คลังสินค้า และสถานะการขนส่ง",
                    url: "https://roengchais-ship-it.github.io/Warehouse-QC-Management-SystemV3/",
                    icon: <Package size={36} />, 
                    color: "from-emerald-600 to-teal-500",
                    hoverColor: "text-emerald-600",
                    bgLight: "bg-emerald-50",
                    tag: "WH"
                },
                {
                    id: 3,
                    name: "Stock System",
                    description: "ระบบจัดการสต็อกสินค้า เช็คยอดคงเหลือแบบเรียลไทม์",
                    url: "https://roengchais-ship-it.github.io/oneststock/",
                    icon: <Layers size={36} />, 
                    color: "from-cyan-600 to-blue-500",
                    hoverColor: "text-cyan-600",
                    bgLight: "bg-cyan-50",
                    tag: "ST"
                },
                {
                    id: 4,
                    name: "Onest Order",
                    description: "ระบบ ERP จัดการรายการสั่งซื้อ ออกบิล และใบเสร็จ",
                    url: "https://roengchais-ship-it.github.io/Onset-ERP/",
                    icon: <ShoppingCart size={36} />, 
                    color: "from-blue-600 to-indigo-500",
                    hoverColor: "text-blue-600",
                    bgLight: "bg-blue-50",
                    tag: "ERP"
                },
                {
                    id: 5,
                    name: "Forecast",
                    description: "ระบบพยากรณ์ คาดการณ์ยอดขายและประเมินสินค้าคงคลัง",
                    url: "https://roengchais-ship-it.github.io/forecast/",
                    icon: <TrendingUp size={36} />, 
                    color: "from-purple-600 to-fuchsia-500",
                    hoverColor: "text-purple-600",
                    bgLight: "bg-purple-50",
                    tag: "FC"
                }
            ];

            return (
                <>
                    {/* Top Navigation Bar */}
                    <nav className="bg-[#2C4635] text-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="bg-white/10 p-2 rounded-xl backdrop-blur-md border border-white/10">
                                    <ShieldCheck className="text-white" size={24} />
                                </div>
                                <div>
                                    <span className="font-bold text-lg tracking-wide">มีเมตตา System</span>
                                    <span className="text-[11px] text-white/70 block -mt-1 font-medium uppercase tracking-wider">Internal Portal</span>
                                </div>
                            </div>
                            <div className="flex items-center space-x-5">
                                <div className="hidden md:flex flex-col text-right">
                                    <div className="text-sm font-semibold tracking-wider">
                                        {currentTime.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})}
                                    </div>
                                    <div className="text-[11px] text-white/70">
                                        {currentTime.toLocaleDateString('th-TH', {weekday: 'long', day: 'numeric', month: 'short', year: 'numeric'})}
                                    </div>
                                </div>
                                <div className="h-9 w-9 bg-white/10 rounded-full flex items-center justify-center border border-white/20 cursor-pointer hover:bg-white/20 hover:scale-105 transition-all duration-200">
                                    <UserCircle size={22} />
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10 space-y-10">
                        
                        {/* News Ticker */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-1 flex items-center animate-fade-in-up" style={{animationDelay: '0.1s'}}>
                            <div className="bg-amber-100/80 p-3 rounded-xl shrink-0 ml-1">
                                <Megaphone size={20} className="text-amber-700" />
                            </div>
                            <div className="flex-1 overflow-hidden px-4">
                                <div className="flex flex-col sm:flex-row sm:items-center gap-2">
                                    <span className="text-[11px] font-bold bg-amber-500 text-white px-2.5 py-1 rounded-md tracking-wide">ประกาศ</span>
                                    <p className="text-sm text-slate-600 truncate font-medium">
                                        ขอความร่วมมือพนักงานทุกท่าน ตรวจสอบสินค้า Lot ล่าสุดอย่างละเอียด (มีผล 26 ม.ค.)
                                    </p>
                                </div>
                            </div>
                            <button className="p-3 mr-1 text-slate-400 hover:text-slate-700 hover:bg-slate-50 rounded-xl transition-colors">
                                <ArrowRight size={18} />
                            </button>
                        </div>

                        {/* Hero Section & Weather Widget */}
                        <div className="flex flex-col lg:flex-row lg:items-end justify-between gap-6">
                            <div className="animate-fade-in-up space-y-2" style={{animationDelay: '0.2s'}}>
                                <h1 className="text-3xl font-bold text-slate-800 tracking-tight">สวัสดี, ทีมงานคุณภาพ 👋</h1>
                                <p className="text-slate-500 font-medium">เลือกเมนูหลักด้านล่างเพื่อเข้าสู่ระบบงานของคุณ</p>
                            </div>
                            
                            {/* Weather Widget */}
                            <div className="flex items-center gap-4 bg-white px-5 py-3 rounded-2xl shadow-sm border border-slate-200/60 animate-fade-in-up hover:shadow-md transition-shadow cursor-default" style={{animationDelay: '0.3s'}}>
                                <div className="bg-sky-50 p-2 rounded-full">
                                    <Cloud className="text-sky-500" size={26} />
                                </div>
                                <div>
                                    <div className="text-lg font-bold text-slate-700 leading-none mb-1">28°C</div>
                                    <div className="text-xs font-medium text-slate-500">คลังสินค้าหลัก A</div>
                                </div>
                            </div>
                        </div>

                        {/* Main Systems Cards - Grid Adjusted to 3 columns for 5 items to look balanced */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {systems.map((system, index) => (
                                <a 
                                    key={system.id}
                                    href={system.url}
                                    className="group relative overflow-hidden rounded-2xl bg-white border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 flex flex-col h-full min-h-[260px] animate-fade-in-up"
                                    style={{animationDelay: `${0.1 * (index + 4)}s`}}
                                >
                                    {/* Top Color Line */}
                                    <div className={`h-1.5 w-full bg-gradient-to-r ${system.color} absolute top-0 left-0`}></div>
                                    
                                    {/* Abstract Circle Decoration */}
                                    <div className={`h-36 w-36 bg-gradient-to-br ${system.color} absolute -top-12 -right-12 rounded-full opacity-[0.03] transition-transform duration-700 group-hover:scale-[1.8]`}></div>
                                    
                                    <div className="relative z-10 p-6 flex flex-col h-full">
                                        {/* Card Header */}
                                        <div className="flex justify-between items-start mb-6">
                                            <div className={`p-3.5 rounded-2xl shadow-sm transition-colors duration-300 ${system.bgLight} ${system.hoverColor} group-hover:bg-opacity-80 ring-1 ring-slate-100`}>
                                                {system.icon}
                                            </div>
                                            <span className="bg-slate-100 border border-slate-200 text-slate-500 text-[10px] px-2.5 py-1 rounded-lg font-bold uppercase tracking-widest shadow-sm">
                                                {system.tag}
                                            </span>
                                        </div>
                                        
                                        {/* Card Body */}
                                        <div className="flex-grow">
                                            <h2 className={`text-xl font-bold text-slate-800 mb-2 group-hover:${system.hoverColor} transition-colors duration-300`}>
                                                {system.name}
                                            </h2>
                                            <p className="text-sm text-slate-500 leading-relaxed font-medium">
                                                {system.description}
                                            </p>
                                        </div>

                                        {/* Card Footer (Action) */}
                                        <div className="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between">
                                            <span className={`text-sm font-bold ${system.hoverColor} group-hover:underline underline-offset-4 decoration-2`}>
                                                เข้าสู่ระบบ
                                            </span>
                                            <div className={`h-8 w-8 rounded-full bg-slate-50 flex items-center justify-center group-hover:${system.bgLight} transition-colors duration-300`}>
                                                <ArrowRight size={16} className={`${system.hoverColor} group-hover:translate-x-0.5 transition-transform`} />
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            ))}
                        </div>

                    </main>

                    {/* Footer - Now positioned correctly at the bottom without floating over content */}
                    <footer className="w-full py-6 mt-auto bg-white border-t border-slate-200">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-2">
                            <p className="text-sm font-medium text-slate-500">
                                © 2024 <span className="text-slate-700 font-bold">มีเมตตา System</span>. All rights reserved.
                            </p>
                            <p className="text-sm font-medium text-slate-500 flex items-center gap-2">
                                พบปัญหาการใช้งาน ติดต่อฝ่าย IT 
                                <span className="bg-slate-100 text-slate-700 px-2 py-0.5 rounded-md font-bold text-xs">โทร. 1150</span>
                            </p>
                        </div>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
